<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Contacto · Pediatría</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">

<style>
:root{
  --pink:#ff4d6d;
  --soft-pink:#ffd6de;
  --light:#fff5f7;
  --deep:#7a1e3a;
  --glass:rgba(255,255,255,0.7);
  --radius:24px;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background: linear-gradient(135deg,#ffe4ea,#fff5f7);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:480px;
  padding:20px;
}

.card{
  backdrop-filter: blur(12px);
  background: var(--glass);
  border-radius:var(--radius);
  padding:30px 22px;
  text-align:center;
  box-shadow:0 20px 50px rgba(255,77,109,0.15);
  border:1px solid rgba(255,255,255,0.4);
}

.photo{
  width:170px;
  height:170px;
  border-radius:50%;
  margin:auto;
  background:linear-gradient(135deg,#ff4d6d,#ff9aaa);
  padding:5px;
  box-shadow:0 12px 30px rgba(255,77,109,0.3);
}

.photo img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

.social-icons{
  display:flex;
  justify-content:center;
  gap:14px;
  margin:15px 0 10px;
}

.social-icon{
  width:42px;
  height:42px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  box-shadow:0 8px 18px rgba(0,0,0,0.12);
  transition:.3s;
}

.social-icon.ig{
  background: linear-gradient(135deg,#fd5949,#d6249f,#285AEB);
}

.social-icon.fb{
  background:#1877f2;
}

.social-icon svg{
  width:20px;
  height:20px;
  fill:white;
}

.social-icon:hover{
  transform:scale(1.12);
  box-shadow:0 12px 28px rgba(0,0,0,0.2);
}

h1{
  margin:12px 0 5px;
  font-size:1.4rem;
  color:var(--deep);
}

.role{
  color:#b23a57;
  font-weight:600;
  margin-bottom:20px;
}

.btn{
  display:block;
  width:85%;
  margin:10px auto;
  padding:14px;
  border-radius:18px;
  text-decoration:none;
  font-weight:700;
  transition:.3s;
}

.btn-secondary{
  background:white;
  color:var(--pink);
  box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.btn:hover{
  transform:translateY(-3px);
}

.save{
  margin-top:18px;
  background:transparent;
  border:2px solid var(--pink);
  color:var(--pink);
  padding:10px 20px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}

.footer{
  margin-top:15px;
  font-size:.8rem;
  color:#b23a57;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="photo">
      <img src="https://i.postimg.cc/ThMrHv7t/Whats-App-Image-2026-03-20-at-4-32-11-PM.jpg">
    </div>

    <!-- REDES CON DEEP LINK -->
    <div class="social-icons">

      <!-- Instagram -->
      <a class="social-icon ig" href="#"
      onclick="window.location='instagram://user?username=dra.aletupediatra'; setTimeout(()=>{window.location='https://www.instagram.com/dra.aletupediatra';},500); return false;">
        <svg viewBox="0 0 24 24">
          <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 
          5-2.2 5-5V7c0-2.8-2.2-5-5-5H7z"/>
        </svg>
      </a>

      <!-- Facebook -->
      <a class="social-icon fb" href="#"
      onclick="window.location='fb://facewebmodal/f?href=https://www.facebook.com/share/188XTMQvJG/'; setTimeout(()=>{window.location='https://www.facebook.com/share/188XTMQvJG/';},500); return false;">
        <svg viewBox="0 0 24 24">
          <path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9v-2.9h2.5V9.8"/>
        </svg>
      </a>

    </div>

    <h1>Dra. Alejandra Guzman Medina</h1>
    <div class="role">Pediatra · Neonatóloga</div>

    <a href="https://wa.me/5218332432252" class="btn btn-secondary">💬 WhatsApp</a>
    <a href="tel:+528331225101" class="btn btn-secondary">📱 Llamar</a>

    <button class="save" id="saveContact">Guardar contacto</button>

    <div class="footer">Form Tech | 8332318763</div>

  </div>
</div>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>

<script>
document.getElementById('saveContact').addEventListener('click', function(){
  const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Dra. Alejandra Guzman Medina
TITLE:Pediatra y Neonatóloga
TEL:+528332318763
EMAIL:a.danielaguzman@hotmail.com
END:VCARD`;

  const blob = new Blob([vcard], {type:'text/vcard'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = "Contacto.vcf";
  link.click();
});
</script>

</body>
</html>
