<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Contacto · Pediatría</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">

<style>
:root{
  --pink:#ff4d6d;
  --soft-pink:#ffd6de;
  --light:#fff5f7;
  --deep:#7a1e3a;
  --glass:rgba(255,255,255,0.7);
  --radius:24px;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background: linear-gradient(135deg,#ffe4ea,#fff5f7);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* CONTENEDOR */
.container{
  width:100%;
  max-width:480px;
  padding:20px;
}

/* TARJETA */
.card{
  backdrop-filter: blur(12px);
  background: var(--glass);
  border-radius:var(--radius);
  padding:30px 22px;
  text-align:center;
  box-shadow:0 20px 50px rgba(255,77,109,0.15);
  border:1px solid rgba(255,255,255,0.4);
}

/* FOTO */
.photo{
  width:170px;
  height:170px;
  border-radius:50%;
  margin:auto;
  background:linear-gradient(135deg,#ff4d6d,#ff9aaa);
  padding:5px;
  box-shadow:0 12px 30px rgba(255,77,109,0.3);
}

.photo img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

/* REDES */
.social-icons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:15px 0 10px;
}

.social-icon{
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
  color:var(--pink);
  font-size:18px;
  text-decoration:none;
  box-shadow:0 6px 16px rgba(0,0,0,0.1);
  transition:.3s;
}

.social-icon:hover{
  transform:scale(1.1);
}

/* TEXTO */
h1{
  margin:12px 0 5px;
  font-size:1.4rem;
  color:var(--deep);
}

.role{
  color:#b23a57;
  font-weight:600;
  margin-bottom:20px;
}

/* BOTONES */
.btn{
  display:block;
  width:85%;
  margin:10px auto;
  padding:14px;
  border-radius:18px;
  text-decoration:none;
  font-weight:700;
  transition:.3s;
}

/* PRINCIPAL (AGENDA) */
.btn-primary{
  background: linear-gradient(135deg,#ff4d6d,#ff8fa3);
  color:white;
  font-size:1.05rem;
  box-shadow:0 12px 28px rgba(255,77,109,0.35);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,77,109,0.4);}
  70%{box-shadow:0 0 0 15px rgba(255,77,109,0);}
  100%{box-shadow:0 0 0 0 rgba(255,77,109,0);}
}

/* SECUNDARIOS */
.btn-secondary{
  background:white;
  color:var(--pink);
  box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.btn:hover{
  transform:translateY(-3px);
}

/* GUARDAR */
.save{
  margin-top:18px;
  background:transparent;
  border:2px solid var(--pink);
  color:var(--pink);
  padding:10px 20px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}

.footer{
  margin-top:15px;
  font-size:.8rem;
  color:#b23a57;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="photo">
      <img src="https://i.postimg.cc/qBnMFvD7/Teresa-Guzman-Sin-fondo.png">
    </div>

    <div class="social-icons">
      <a class="social-icon" href="https://www.instagram.com/tuusuario" target="_blank">📸</a>
      <a class="social-icon" href="https://www.facebook.com/luisarteaga" target="_blank">📘</a>
    </div>

    <h1>Dra. Alejandra Guzman Medina</h1>
    <div class="role">Pediatra · Neonatóloga</div>

    <!-- BOTÓN PRINCIPAL -->
    <a href="#" class="btn btn-primary"
       onclick="Calendly.initPopupWidget({url: 'https://calendly.com/luis-arteaga-rocha/30min'});return false;">
       📅 Agenda tu cita
    </a>

    <!-- BOTONES SECUNDARIOS -->
    <a href="https://wa.me/528332318763" class="btn btn-secondary">💬 WhatsApp</a>
    <a href="tel:+528332318763" class="btn btn-secondary">📱 Llamar</a>

    <button class="save" id="saveContact">Guardar contacto</button>

    <div class="footer">Form Tech | 8332318763</div>

  </div>
</div>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>

<script>
document.getElementById('saveContact').addEventListener('click', function(){
  const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Dra. Alejandra Guzman Medina
TITLE:Pediatra y Neonatóloga
TEL:+528332318763
EMAIL:a.danielaguzman@hotmail.com
END:VCARD`;

  const blob = new Blob([vcard], {type:'text/vcard'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = "Contacto.vcf";
  link.click();
});
</script>

</body>
</html>
