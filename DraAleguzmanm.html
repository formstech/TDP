<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Contacto · Pediatría</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">

<style>
:root{
  --pink:#ff4d6d;
  --soft-pink:#ffd6de;
  --light:#fff5f7;
  --deep:#7a1e3a;
  --glass:rgba(255,255,255,0.7);
  --radius:24px;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background: linear-gradient(135deg,#ffe4ea,#fff5f7);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* CONTENEDOR */
.container{
  width:100%;
  max-width:480px;
  padding:20px;
}

/* TARJETA */
.card{
  backdrop-filter: blur(12px);
  background: var(--glass);
  border-radius:var(--radius);
  padding:30px 22px;
  text-align:center;
  box-shadow:0 20px 50px rgba(255,77,109,0.15);
  border:1px solid rgba(255,255,255,0.4);
}

/* FOTO */
.photo{
  width:170px;
  height:170px;
  border-radius:50%;
  margin:auto;
  background:linear-gradient(135deg,#ff4d6d,#ff9aaa);
  padding:5px;
  box-shadow:0 12px 30px rgba(255,77,109,0.3);
}

.photo img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

/* REDES */
.social-icons{
  display:flex;
  justify-content:center;
  gap:14px;
  margin:15px 0 10px;
}

.social-icon{
  width:42px;
  height:42px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  box-shadow:0 8px 18px rgba(0,0,0,0.12);
  transition:.3s;
}

/* COLORES OFICIALES */
.social-icon.ig{
  background: linear-gradient(135deg,#fd5949,#d6249f,#285AEB);
}

.social-icon.fb{
  background:#1877f2;
}

.social-icon svg{
  width:20px;
  height:20px;
  fill:white;
}

.social-icon:hover{
  transform:scale(1.12);
  box-shadow:0 12px 28px rgba(0,0,0,0.2);
}

/* TEXTO */
h1{
  margin:12px 0 5px;
  font-size:1.4rem;
  color:var(--deep);
}

.role{
  color:#b23a57;
  font-weight:600;
  margin-bottom:20px;
}

/* BOTONES */
.btn{
  display:block;
  width:85%;
  margin:10px auto;
  padding:14px;
  border-radius:18px;
  text-decoration:none;
  font-weight:700;
  transition:.3s;
}

/* PRINCIPAL */
.btn-primary{
  background: linear-gradient(135deg,#ff4d6d,#ff8fa3);
  color:white;
  font-size:1.05rem;
  box-shadow:0 12px 28px rgba(255,77,109,0.35);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,77,109,0.4);}
  70%{box-shadow:0 0 0 15px rgba(255,77,109,0);}
  100%{box-shadow:0 0 0 0 rgba(255,77,109,0);}
}

/* SECUNDARIOS */
.btn-secondary{
  background:white;
  color:var(--pink);
  box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.btn:hover{
  transform:translateY(-3px);
}

/* GUARDAR */
.save{
  margin-top:18px;
  background:transparent;
  border:2px solid var(--pink);
  color:var(--pink);
  padding:10px 20px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}

.footer{
  margin-top:15px;
  font-size:.8rem;
  color:#b23a57;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="photo">
      <img src="https://i.postimg.cc/ThMrHv7t/Whats-App-Image-2026-03-20-at-4-32-11-PM.jpg">
    </div>

    <!-- REDES MEJORADAS -->
    <div class="social-icons">

      <!-- Instagram -->
      <a class="social-icon ig" href="https://www.instagram.com/dra.aletupediatra?igsh=NHB1bXlhNXRhNmc0&utm_source=qr" target="_blank">
        <svg viewBox="0 0 24 24">
          <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 
          5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm10 2c1.7 0 3 1.3 
          3 3v10c0 1.7-1.3 3-3 3H7c-1.7 0-3-1.3-3-3V7c0-1.7 
          1.3-3 3-3h10zm-5 3.5A5.5 5.5 0 1 0 12 18.5 5.5 
          5.5 0 0 0 12 7.5zm0 2A3.5 3.5 0 1 1 8.5 13 
          3.5 3.5 0 0 1 12 9.5zm4.8-.9a1.3 1.3 0 1 
          1-2.6 0 1.3 1.3 0 0 1 2.6 0z"/>
        </svg>
      </a>

      <!-- Facebook -->
      <a class="social-icon fb" href="https://www.facebook.com/share/188XTMQvJG/?mibextid=wwXIfr" target="_blank">
        <svg viewBox="0 0 24 24">
          <path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9v-2.9h2.5V9.8c0-2.5 
          1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.4h-1.3c-1.3 
          0-1.7.8-1.7 1.6v2h2.9l-.5 2.9h-2.4v7A10 
          10 0 0 0 22 12z"/>
        </svg>
      </a>

    </div>

    <h1>Dra. Alejandra Guzman Medina</h1>
    <div class="role">Pediatra · Neonatóloga</div>

    <a href="https://wa.me/5218332432252" class="btn btn-secondary">💬 WhatsApp</a>
    <a href="tel:+528331225101" class="btn btn-secondary">📱 Llamar</a>

    <button class="save" id="saveContact">Guardar contacto</button>

    <div class="footer">Form Tech | 8332318763</div>

  </div>
</div>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>

<script>
document.getElementById('saveContact').addEventListener('click', function(){
  const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Dra. Alejandra Guzman Medina
TITLE:Pediatra y Neonatóloga
TEL:+528332318763
EMAIL:a.danielaguzman@hotmail.com
END:VCARD`;

  const blob = new Blob([vcard], {type:'text/vcard'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = "Contacto.vcf";
  link.click();
});
</script>

</body>
</html>
