<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Arteaga Accessories</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#050816;
  --card:rgba(15,23,42,.78);

  --line:rgba(255,255,255,.08);

  --cyan:#00E5FF;
  --cyan2:#00B8D4;

  --purple:#7C3AED;

  --text:#ffffff;
  --muted:#94A3B8;

  --success:#25D366;

  --radius:30px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Montserrat',sans-serif;

  min-height:100vh;

  background:
  radial-gradient(circle at top left,#00E5FF25,transparent 30%),
  radial-gradient(circle at bottom right,#7C3AED35,transparent 35%),
  #050816;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:22px;

  overflow-x:hidden;

}

/* CONTENEDOR */

.container{
  width:100%;
  max-width:520px;
}

/* TARJETA */

.card{

  position:relative;

  overflow:hidden;

  border-radius:var(--radius);

  background:var(--card);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.06);

  box-shadow:
  0 20px 60px rgba(0,0,0,.55);

  animation:fadeIn .8s ease;

}

/* EFECTO */

.card::before{

  content:"";

  position:absolute;

  width:280px;
  height:280px;

  background:rgba(0,229,255,.10);

  border-radius:50%;

  top:-120px;
  right:-120px;

  filter:blur(20px);

}

/* PORTADA */

.cover{

  position:relative;

  height:240px;

  overflow:hidden;

}

.cover img{

  width:100%;
  height:100%;

  object-fit:cover;

  transform:scale(1.03);

}

/* OVERLAY */

.overlay{

  position:absolute;
  inset:0;

  background:
  linear-gradient(
  to top,
  rgba(5,8,22,1) 5%,
  rgba(5,8,22,.45) 45%,
  rgba(5,8,22,.10)
  );

}

/* LOGO */

.logo{

  position:absolute;

  bottom:-58px;
  left:50%;

  transform:translateX(-50%);

  width:125px;
  height:125px;

  border-radius:28px;

  border:4px solid rgba(255,255,255,.10);

  overflow:hidden;

  background:#0f172a;

  box-shadow:
  0 0 35px rgba(0,229,255,.30);

}

.logo img{

  width:100%;
  height:100%;
  object-fit:cover;

}

/* CONTENIDO */

.content{

  padding:
  80px
  28px
  32px;

  text-align:center;

}

/* BADGE */

.badge{

  display:inline-flex;

  align-items:center;
  gap:8px;

  padding:10px 18px;

  border-radius:999px;

  background:rgba(0,229,255,.10);

  border:1px solid rgba(0,229,255,.18);

  color:var(--cyan);

  font-size:.8rem;

  font-weight:700;

  letter-spacing:.4px;

}

/* TITULO */

h1{

  margin-top:18px;

  color:white;

  font-size:2rem;

  font-weight:800;

}

/* SUB */

.role{

  margin-top:12px;

  color:var(--muted);

  line-height:1.7;

  font-size:.97rem;

}

/* PRODUCTOS */

.products{

  margin-top:28px;

  display:flex;

  flex-wrap:wrap;

  gap:12px;

  justify-content:center;

}

.product{

  padding:11px 15px;

  border-radius:16px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.06);

  color:#E2E8F0;

  font-size:.85rem;

  font-weight:600;

  transition:.3s;

}

.product:hover{

  transform:translateY(-3px);

  background:rgba(0,229,255,.08);

}

/* BOTONES */

.buttons{

  margin-top:32px;

  display:flex;

  flex-direction:column;

  gap:15px;

}

.btn{

  text-decoration:none;

  padding:17px;

  border-radius:18px;

  font-weight:700;

  display:flex;

  align-items:center;
  justify-content:center;

  gap:10px;

  transition:.3s;

}

/* WHATSAPP */

.btn-whatsapp{

  background:
  linear-gradient(
  135deg,
  #25D366,
  #1ebe5d
  );

  color:white;

  box-shadow:
  0 18px 35px rgba(37,211,102,.30);

}

.btn-whatsapp:hover{

  transform:translateY(-3px) scale(1.02);

}

/* SECUNDARIOS */

.btn-secondary{

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.06);

  color:white;

}

.btn-secondary:hover{

  background:rgba(0,229,255,.10);

  transform:translateY(-2px);

}

/* REDES */

.socials{

  margin-top:30px;

  display:flex;

  justify-content:center;

  gap:15px;

}

.social{

  width:48px;
  height:48px;

  border-radius:16px;

  display:flex;
  align-items:center;
  justify-content:center;

  text-decoration:none;

  background:rgba(255,255,255,.05);

  color:white;

  font-size:1.2rem;

  transition:.3s;

}

.social:hover{

  transform:translateY(-4px);

  background:rgba(0,229,255,.12);

}

/* FOOTER */

.footer{

  margin-top:30px;

  color:#64748B;

  font-size:.82rem;

}

/* ANIMACION */

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(20px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

/* RESPONSIVE */

@media(max-width:480px){

  .cover{
    height:210px;
  }

  .logo{
    width:110px;
    height:110px;
    bottom:-50px;
  }

  .content{
    padding:72px 22px 28px;
  }

  h1{
    font-size:1.7rem;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="card">

    <!-- IMAGEN PRINCIPAL -->
    <div class="cover">

      <img src="https://i.postimg.cc/nVK7PXfj/4e22e08f-629e-436a-b650-1febadaec7fc.jpg">

      <div class="overlay"></div>

      <!-- FOTO / LOGO -->
      <div class="logo">

        <img src="https://i.postimg.cc/nVK7PXfj/4e22e08f-629e-436a-b650-1febadaec7fc.jpg">

      </div>

    </div>

    <!-- CONTENIDO -->
    <div class="content">

      <div class="badge">
        ⚡ ACCESORIOS PREMIUM
      </div>

      <h1>Arteaga Accessories</h1>

      <div class="role">

        Cases, micas, audífonos, cargadores y accesorios
        premium para iPhone, Samsung, Xiaomi y más.

      </div>

      <!-- PRODUCTOS -->
      <div class="products">

        <div class="product">📱 Micas</div>

        <div class="product">🎧 AirPods</div>

        <div class="product">🔋 Cargadores</div>

        <div class="product">📲 Cases</div>

        <div class="product">⌚ Smartwatch</div>

      </div>

      <!-- BOTONES -->
      <div class="buttons">

        <a
        href="https://wa.me/521XXXXXXXXXX"
        target="_blank"
        class="btn btn-whatsapp">

        📲 Comprar por WhatsApp

        </a>

        <a
        href="https://wa.me/c/521XXXXXXXXXX"
        target="_blank"
        class="btn btn-secondary">

        🛒 Ver Catálogo

        </a>

        <a
        href="tel:+52XXXXXXXXXX"
        class="btn btn-secondary">

        📞 Llamar

        </a>

        <a
        href="#"
        class="btn btn-secondary">

        📍 Ver Ubicación

        </a>

      </div>

      <!-- REDES -->
      <div class="socials">

        <a href="#" class="social">📸</a>

        <a href="#" class="social">🎵</a>

        <a href="#" class="social">📘</a>

      </div>

      <div class="footer">
        Tecnología · Estilo · Protección
      </div>

    </div>

  </div>

</div>

</body>
</html>
